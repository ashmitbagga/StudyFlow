<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignments - Student Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <div class="container">
    <h1 class="page-title">Assignment Tracker</h1>
    <p class="page-subtitle">Deadlines, status, and reminders.</p>

    <div class="section-box">
      <h2>Add Assignment</h2>
      <form id="assignment-form" class="inline-form">
        <div class="field">
          <label for="a-title">Title</label>
          <input type="text" id="a-title" required placeholder="e.g. Physics Lab Report">
        </div>
        <div class="field">
          <label for="a-subject">Subject</label>
          <input type="text" id="a-subject" placeholder="e.g. Physics">
        </div>
        <div class="field">
          <label for="a-due">Due Date</label>
          <input type="date" id="a-due">
        </div>
        <div class="field">
          <label for="a-status">Status</label>
          <select id="a-status">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="field">
          <button type="submit">Add Assignment</button>
        </div>
      </form>
      <div class="error-message" id="assignment-error"></div>
    </div>

    <div class="section-box">
      <h2>All Assignments</h2>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Subject</th>
            <th>Due Date</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="assignment-rows">
          <!-- filled in by assignments.js -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/assignments.js"></script>
</body>
</html>
