<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search - Student Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <div class="container">
    <h1 class="page-title">Search</h1>
    <p class="page-subtitle">Unified search across assignments, timetable, and exams.</p>

    <div class="section-box">
      <form id="search-form" class="inline-form">
        <div class="field">
          <label for="search-input">Search for anything</label>
          <input type="text" id="search-input" placeholder="e.g. Physics" required>
        </div>
        <div class="field">
          <button type="submit">Search</button>
        </div>
      </form>
    </div>

    <div class="section-box">
      <h2>Assignments</h2>
      <div id="results-assignments" class="text-muted">Search above to see results.</div>
    </div>

    <div class="section-box">
      <h2>Timetable</h2>
      <div id="results-timetable" class="text-muted">Search above to see results.</div>
    </div>

    <div class="section-box">
      <h2>Exams</h2>
      <div id="results-exams" class="text-muted">Search above to see results.</div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
